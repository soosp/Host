name=Host
version=0.6.1
author=soosp
maintainer=soosp
sentence=Represents a network host identified by either an IP address or an FQDN.
paragraph=Thread-safe Arduino library for storing and resolving network hosts. Supports IPv4 addresses and fully qualified domain names (FQDN) with RFC 1035 / RFC 3696 validation. Built-in DNS resolution on ESP32 (via Network.hostByName), ESP8266 (via WiFi.hostByName) and AVR (with Ethernet shield, via DNSClient::getHostByName), with custom resolver callback support for other platforms.
